version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        # pnpm 10 matches what Replit uses to generate the lockfile.
        # --no-frozen-lockfile lets pnpm reconcile workspace config (minimumReleaseAge,
        # onlyBuiltDependencies) without hitting ERR_PNPM_LOCKFILE_CONFIG_MISMATCH.
        - corepack prepare pnpm@10 --activate
        - pnpm install --no-frozen-lockfile
        # Build the shared libs (db types, api-client) the lms package depends on
        - pnpm run typecheck:libs
    build:
      commands:
        - pnpm --filter @workspace/lms run build
  artifacts:
    # Vite is configured to output here (see artifacts/lms/vite.config.ts)
    baseDirectory: artifacts/lms/dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - artifacts/lms/node_modules/**/*
      - lib/*/node_modules/**/*

custom_headers:
  - pattern: '**/*'
    headers:
      - key: Cache-Control
        value: no-cache

redirects:
  # Proxy /api/* to the Render API server.
  # Set RENDER_API_URL in Amplify Console → Environment Variables
  # e.g. https://ojt-kdd3.onrender.com
  - source: /api/<proxy+>
    target: '#{RENDER_API_URL}/api/<proxy+>'
    status: '200'

  # SPA fallback — send every unmatched path to index.html
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>'
    target: /index.html
    status: '200'
